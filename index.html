<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="../dist/style.css">

</head>

<body>
  <button type="button" class="btn__theme" id="btn-theme">
    <img class="button__theme-icon" id="img-theme-light" src="./assets/images/sun-solid-full.svg" alt="Theme Light">
    <img class="button__theme-icon" id="img-theme-dark" src="./assets/images/moon-solid-full.svg" alt=" Theme Dark">
  </button>

  <main class="container">
    <article class="result-summary">
      <section class="results">
        <h1 class="results__title">Your Result</h1>
        <p class="results__score">
          <strong class="results__score-achieved" id="results-score-achieved">00</strong>
          of 100
        </p>
        <section class="results__description">
          <p class="results__rank" id="results-rank">Great</p>
          <p class="results__text" id="results-text">You scored higher than 65% of the people who have taken these tests.</p>
        </section>

      </section>
      <section class="summary">
        <h2 class="summary__title">Summary</h2>
        <section class="summary__score">
          <ul class="summary__item-container" id="summary-item-container">
            <!--Conteúdo carregado por fetch-->
            <li>Ative o JavaScript para que a aplicação funcione corretamente</li>
          </ul>
        </section>
        <button class="summary__button">Continue</button>
      </section>
    </article>
  </main>

  <script type="module" src="../dist/script.js"></script>
</body>

</html>
